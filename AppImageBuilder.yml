# appimage-builder recipe see https://appimage-builder.readthedocs.io for details
version: 1
AppDir:
  path: /media/developer/Data/Development/c++/ORB_SLAM3/AppDir
  app_info:
    id: io.xrworkout.orbslammer
    name: ORBSlammer
    icon: application-vnd.appimage
    version: latest
    exec: localization_service_host
    exec_args: $@
  apt:
    arch:
    - amd64
    allow_unauthenticated: true
    sources:
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble main restricted
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble-updates main restricted
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble universe
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble-updates universe
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble multiverse
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble-updates multiverse
    - sourceline: deb http://at.archive.ubuntu.com/ubuntu/ noble-backports main restricted
        universe multiverse
    - sourceline: deb http://security.ubuntu.com/ubuntu noble-security main restricted
    - sourceline: deb http://security.ubuntu.com/ubuntu noble-security universe
    - sourceline: deb http://security.ubuntu.com/ubuntu noble-security multiverse
    include:
    - libc6:amd64
    - libopencv-videoio406t64
    - libopencv-imgcodecs406t64
    - libopencv-calib3d406t64
    - libopencv-imgproc406t64
    - libopencv-core406t64
    - libopencv-features2d406t64
    - libopencv-flann406t64
    - libboost-serialization1.83.0
    - libv4l-0t64
  files:
    include: []
    exclude:
    - usr/share/man
    - usr/share/doc/*/README.*
    - usr/share/doc/*/changelog.*
    - usr/share/doc/*/NEWS.*
    - usr/share/doc/*/TODO.*
  test:
    fedora-30:
      image: appimagecrafters/tests-env:fedora-30
      command: ./AppRun
    debian-stable:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun
    archlinux-latest:
      image: appimagecrafters/tests-env:archlinux-latest
      command: ./AppRun
    centos-7:
      image: appimagecrafters/tests-env:centos-7
      command: ./AppRun
    ubuntu-xenial:
      image: appimagecrafters/tests-env:ubuntu-xenial
      command: ./AppRun
AppImage:
  arch: x86_64
  update-information: guess
